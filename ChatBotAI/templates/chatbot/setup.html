<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - ChatBotAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-light: #94a3b8;
            --border-color: #e2e8f0;
            --danger-color: #ef4444;
        }
        :root[data-theme="dark"] {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-light: #64748b;
            --border-color: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .setup-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }
        .setup-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .setup-header .logo-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 12px;
        }
        .setup-header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .setup-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.9375rem;
            font-family: inherit;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .form-hint {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 4px;
        }
        .btn-setup {
            width: 100%;
            padding: 12px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9375rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-setup:hover { background: var(--primary-hover); }
        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        :root[data-theme="dark"] .error-message {
            background: #450a0a;
            border-color: #7f1d1d;
            color: #fca5a5;
        }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="setup-header">
            <div class="logo-icon"><i class="fas fa-robot"></i></div>
            <h1>ChatBotAI Setup</h1>
            <p data-i18n="auth.setupSubtitle">Erstellen Sie den ersten Benutzer</p>
        </div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="username" data-i18n="auth.username">Benutzername</label>
                <input type="text" id="username" name="username" value="{{ username or '' }}" required autofocus>
                <div class="form-hint" data-i18n="auth.usernameHint">Zum Anmelden verwendet</div>
            </div>
            <div class="form-group">
                <label for="display_name" data-i18n="auth.displayName">Anzeigename</label>
                <input type="text" id="display_name" name="display_name" value="{{ display_name or '' }}" required>
                <div class="form-hint" data-i18n="auth.displayNameHint">Wird in der Anwendung angezeigt</div>
            </div>
            <div class="form-group">
                <label for="password" data-i18n="auth.password">Passwort</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="password_confirm" data-i18n="auth.passwordConfirm">Passwort bestätigen</label>
                <input type="password" id="password_confirm" name="password_confirm" required>
            </div>
            <button type="submit" class="btn-setup">
                <i class="fas fa-user-plus"></i>
                <span data-i18n="auth.createAccount">Konto erstellen</span>
            </button>
        </form>
    </div>

    <script>
        // Apply saved theme from localStorage
        const theme = localStorage.getItem('chatbot_theme');
        if (theme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
